<VirtualHost *:80>
    ServerName  roberttalemwa.online
    ServerAlias www.roberttalemwa.online
    DocumentRoot /var/www/talemwa/website

    <Directory /var/www/talemwa/website>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/website-error.log
    CustomLog ${APACHE_LOG_DIR}/website-access.log combined

    # Redirect HTTP → HTTPS (Certbot will append redirect rules here)
</VirtualHost>
