<VirtualHost *:80>
    ServerName radio.roberttalemwa.online

    # AzuraCast runs locally on 8080 (HTTP) — Apache owns the public 80/443
    # so it can coexist with the other 3 domains on this VPS.
    ProxyPreserveHost On
    ProxyRequests Off

    # Now Playing SSE / WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/(.*)$ ws://127.0.0.1:8080/$1 [P,L]

    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog  ${APACHE_LOG_DIR}/radio-error.log
    CustomLog ${APACHE_LOG_DIR}/radio-access.log combined
</VirtualHost>
