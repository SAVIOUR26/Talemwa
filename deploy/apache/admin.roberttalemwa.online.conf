<VirtualHost *:80>
    ServerName admin.roberttalemwa.online
    DocumentRoot /var/www/talemwa/dashboard

    <Directory /var/www/talemwa/dashboard>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block direct access to partials
    <DirectoryMatch "/var/www/talemwa/dashboard/partials">
        Require all denied
    </DirectoryMatch>

    ErrorLog  ${APACHE_LOG_DIR}/admin-error.log
    CustomLog ${APACHE_LOG_DIR}/admin-access.log combined
</VirtualHost>
