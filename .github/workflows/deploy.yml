name: Deploy Talemwa Platform

on:
  push:
    branches:
      - main

jobs:
  # ── 1. Build & deploy public website ──────────────────────────────────────
  deploy-website:
    name: Website → roberttalemwa.online
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Tailwind CSS (website)
        working-directory: ./website
        run: |
          npm install -D tailwindcss
          npx tailwindcss -i assets/css/input.css -o assets/css/app.css --minify --config tailwind.config.js

      - name: Upload website files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:           ${{ secrets.FTP_HOST }}
          username:         ${{ secrets.FTP_USERNAME }}
          password:         ${{ secrets.FTP_PASSWORD }}
          local-dir:        ./website/
          server-dir:       roberttalemwa.online/public_html/
          exclude:          |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tailwind.config.js
            **/assets/css/input.css

  # ── 2. Build & deploy admin dashboard ─────────────────────────────────
  deploy-dashboard:
    name: Dashboard → admin.roberttalemwa.online
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Tailwind CSS (dashboard)
        working-directory: ./dashboard
        run: |
          npm install -D tailwindcss
          npx tailwindcss -i assets/css/input.css -o assets/css/app.css --minify --config tailwind.config.js

      - name: Upload dashboard files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:           ${{ secrets.FTP_HOST }}
          username:         ${{ secrets.FTP_USERNAME }}
          password:         ${{ secrets.FTP_PASSWORD }}
          local-dir:        ./dashboard/
          server-dir:       admin.roberttalemwa.online/public_html/
          exclude:          |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tailwind.config.js
            **/assets/css/input.css

  # ── 3. Deploy backend API (no build step needed) ────────────────────────
  deploy-api:
    name: API → api.roberttalemwa.online
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload backend files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:           ${{ secrets.FTP_HOST }}
          username:         ${{ secrets.FTP_USERNAME }}
          password:         ${{ secrets.FTP_PASSWORD }}
          local-dir:        ./backend/
          server-dir:       api.roberttalemwa.online/public_html/
          exclude:          |
            **/.git*
            **/.git*/**
            **/.env
            **/database/**
            **/uploads/**
