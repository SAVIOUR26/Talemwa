name: Deploy Talemwa Platform

on:
  push:
    branches:
      - main

jobs:
  # ── 1. Deploy public website ───────────────────────────────────────────
  deploy-website:
    name: Website → roberttalemwa.online
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload website files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:           ${{ secrets.FTP_HOST }}
          username:         ${{ secrets.FTP_USERNAME }}
          password:         ${{ secrets.FTP_PASSWORD }}
          local-dir:        ./website/
          server-dir:       roberttalemwa.online/public_html/
          exclude:          |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tailwind.config.js
            **/assets/css/input.css

  # ── 2. Deploy admin dashboard ─────────────────────────────────────────
  deploy-dashboard:
    name: Dashboard → admin.roberttalemwa.online
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload dashboard files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:           ${{ secrets.FTP_HOST }}
          username:         ${{ secrets.FTP_USERNAME }}
          password:         ${{ secrets.FTP_PASSWORD }}
          local-dir:        ./dashboard/
          server-dir:       admin.roberttalemwa.online/public_html/
          exclude:          |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tailwind.config.js
            **/assets/css/input.css

  # ── 3. Deploy backend API ──────────────────────────────────────────────────
  deploy-api:
    name: API → api.roberttalemwa.online
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload backend files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:           ${{ secrets.FTP_HOST }}
          username:         ${{ secrets.FTP_USERNAME }}
          password:         ${{ secrets.FTP_PASSWORD }}
          local-dir:        ./backend/
          server-dir:       api.roberttalemwa.online/public_html/
          exclude:          |
            **/.git*
            **/.git*/**
            **/.env
            **/database/**
            **/uploads/**
